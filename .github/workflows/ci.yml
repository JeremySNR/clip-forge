name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  pipeline:
    name: offline pipeline test (ffmpeg, captions, renders)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx --tsconfig tsconfig.node.json scripts/test-pipeline.ts

  smoke:
    name: UI smoke test (Xvfb screenshots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm ci
      - run: ./scripts/smoke-test.sh .tmp/smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-screenshots
          path: .tmp/smoke/
          if-no-files-found: ignore
