name: Release

# Builds installable apps and publishes them to GitHub Releases.
#
# Two ways to cut a release of the version in package.json:
#   1. Push a version tag, e.g. `npm version patch && git push --follow-tags`.
#   2. Land a commit on main whose message starts with "Release v" (handy when
#      the environment can't push tags). electron-builder derives the release
#      tag (vX.Y.Z) from package.json either way.
#
# electron-builder uploads the .dmg / .exe / .AppImage plus the update
# manifests (latest*.yml) the in-app updater reads. Once a user has installed
# any build, every later release installs itself automatically — no more
# `npm run dev`, no manual re-sends.
#
# Uses the built-in GITHUB_TOKEN, so no extra secrets are required as long as
# releases publish to this same repo (see the `publish` block in package.json).

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    # Only actually build/publish for a tag push, a manual dispatch, or a
    # "Release v…" commit to main — ordinary main commits skip (a no-op run).
    if: >-
      github.event_name != 'push' ||
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.event.head_commit.message, 'Release v')
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build and publish
        run: npm run package -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The app is not code-signed yet: stop electron-builder from hunting
          # for a Developer ID certificate (and failing) on the macOS runner.
          CSC_IDENTITY_AUTO_DISCOVERY: false
